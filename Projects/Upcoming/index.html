<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red-glow: white;
            --red-dim: white;
            --blue-primary: #1a6fff;
            --blue-light: #4d9fff;
            --blue-glow: white;
            --dark-bg: #020501;
            --panel-bg: rgba(10, 20, 40, 0.993);
            --circuit-color: rgba(0, 80, 120, 0.18);
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--dark-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            position: relative;
        }

        /* Circuit board SVG background */
        .circuit-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        /* Red overlay vignette */
        /* .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(12, 0, 80, 0.55) 100%);
            z-index: 1;
            pointer-events: none;
        } */

        /* Scanlines */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.08) 3px,
                rgba(0, 0, 0, 0.08) 4px
            );
            z-index: 2;
            pointer-events: none;
        }

        /* Red border frame */
        /* .border-frame {
            position: fixed;
            inset: 6px;
            border: 2px solid var(--red-dim);
            box-shadow: 0 0 12px var(--red-dim), inset 0 0 12px rgba(4, 102, 231, 0.945);
            z-index: 3;
            pointer-events: none;
            border-radius: 4px;
        }
        .border-frame::before {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(4, 102, 231, 0.945);
            border-radius: 2px;
        } */

        /* Corner decorations */
        .corner {
            position: fixed;
            width: 24px;
            height: 24px;
            z-index: 4;
            pointer-events: none;
        }
        .corner-tl { top: 10px; left: 10px; border-top: 3px solid var(--red-glow); border-left: 3px solid var(--red-glow); }
        .corner-tr { top: 10px; right: 10px; border-top: 3px solid var(--red-glow); border-right: 3px solid var(--red-glow); }
        .corner-bl { bottom: 10px; left: 10px; border-bottom: 3px solid var(--red-glow); border-left: 3px solid var(--red-glow); }
        .corner-br { bottom: 10px; right: 10px; border-bottom: 3px solid var(--red-glow); border-right: 3px solid var(--red-glow); }

        /* Main container */
        #hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: min(480px, 90vw);
            animation: fadeInDown 1s ease both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Title */
        .header {
            position: relative;
            text-align: center;
            margin-bottom: 36px;
            padding: 10px 0;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.8rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 0.06em;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            color: white;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }

        /* Spacer so header has height */
        .header-spacer {
            visibility: hidden;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.8rem, 10vw, 5rem);
            font-weight: 900;
            white-space: nowrap;
        }

        /* Menu panel */
        .menu-panel {
            width: 100%;
            background: linear-gradient(160deg, rgba(5,15,35,0.92), rgba(0,8,20,0.96));
            border: 1px solid rgba(30, 80, 180, 0.5);
            box-shadow:
                0 0 0 1px rgba(10, 40, 100, 0.4),
                0 0 30px rgba(0, 60, 180, 0.2),
                inset 0 0 40px rgba(0, 30, 80, 0.15);
            border-radius: 4px;
            padding: 24px 32px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            animation: fadeInDown 1.2s 0.3s ease both;
        }

        /* Panel top bar */
        .menu-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--blue-primary), var(--blue-glow), var(--blue-primary), transparent);
            border-radius: 4px 4px 0 0;
        }

        /* Selector bar on button */
        .menu-btn {
            position: relative;
            width: 100%;
            background: linear-gradient(90deg,
                rgba(10, 35, 90, 0.6) 0%,
                rgba(20, 60, 150, 0.5) 50%,
                rgba(10, 35, 90, 0.6) 100%
            );
            border: 1px solid rgba(50, 110, 220, 0.55);
            border-left: 3px solid var(--blue-primary);
            border-right: 3px solid var(--blue-primary);
            color: #a8d4ff;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.8rem, 3vw, 1rem);
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 14px 24px;
            cursor: pointer;
            text-align: center;
            border-radius: 3px;
            transition: all 0.2s ease;
            overflow: hidden;
            outline: none;

            /* metallic sheen */
            box-shadow:
                inset 0 1px 0 rgba(100,180,255,0.15),
                inset 0 -1px 0 rgba(0,30,100,0.4),
                0 2px 8px rgba(0, 50, 150, 0.3);
        }

        /* Left/right connector nubs */
        .menu-btn::before,
        .menu-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--blue-primary);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--blue-glow);
            transition: background 0.2s, box-shadow 0.2s;
        }
        .menu-btn::before { left: -5px; }
        .menu-btn::after  { right: -5px; }

        /* Hover state */
        .menu-btn:hover,
        .menu-btn:focus-visible {
            background: linear-gradient(90deg,
                rgba(20, 70, 180, 0.8) 0%,
                rgba(30, 100, 220, 0.75) 50%,
                rgba(20, 70, 180, 0.8) 100%
            );
            border-color: var(--blue-glow);
            color: #ffffff;
            text-shadow: 0 0 10px var(--blue-glow), 0 0 20px var(--blue-glow);
            box-shadow:
                inset 0 1px 0 rgba(150,220,255,0.25),
                0 0 15px rgba(0, 120, 255, 0.5),
                0 0 40px rgba(0, 80, 200, 0.3),
                0 0 2px var(--blue-glow);
            animation: btnPulse 0.8s ease-in-out infinite;
        }

        .menu-btn:hover::before,
        .menu-btn:hover::after,
        .menu-btn:focus-visible::before,
        .menu-btn:focus-visible::after {
            background: var(--blue-glow);
            box-shadow: 0 0 10px var(--blue-glow), 0 0 20px var(--blue-glow);
        }

        .menu-btn:active {
            transform: scale(0.98);
            filter: brightness(1.3);
        }

        @keyframes btnPulse {
            0%, 100% {
                box-shadow:
                    inset 0 1px 0 rgba(150,220,255,0.25),
                    0 0 15px rgba(0,120,255,0.5),
                    0 0 40px rgba(0,80,200,0.3);
            }
            50% {
                box-shadow:
                    inset 0 1px 0 rgba(150,220,255,0.25),
                    0 0 25px rgba(0,150,255,0.7),
                    0 0 60px rgba(0,100,230,0.5);
            }
        }

        /* Scanline sweep on hover */
        .menu-btn .btn-inner {
            position: relative;
            z-index: 1;
        }
        .menu-btn .btn-scan {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(100,200,255,0.08) 50%,
                transparent 100%
            );
            background-size: 100% 200%;
            background-position: 0 -100%;
            transition: none;
            opacity: 0;
        }
        .menu-btn:hover .btn-scan {
            opacity: 1;
            animation: scanSweep 1.2s linear infinite;
        }
        @keyframes scanSweep {
            0%   { background-position: 0 -100%; }
            100% { background-position: 0 100%; }
        }

        /* Bottom status bar */
        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 2px 0;
            border-top: 1px solid rgba(30, 80, 180, 0.25);
            color: rgba(80, 150, 255, 0.5);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            animation: fadeInDown 1.4s 0.5s ease both;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 6px #00ff88;
            animation: blink 2s step-start infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .menu-panel {
                padding: 18px 20px 22px;
                gap: 12px;
            }
            .border-frame { inset: 3px; }
            .corner { width: 16px; height: 16px; }
            .corner-tl { top: 6px; left: 6px; }
            .corner-tr { top: 6px; right: 6px; }
            .corner-bl { bottom: 6px; left: 6px; }
            .corner-br { bottom: 6px; right: 6px; }
        }
    </style>
</head>
<body>

    <!-- Circuit board SVG background -->
    <svg class="circuit-bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
        <defs>
            <pattern id="circuit" width="120" height="120" patternUnits="userSpaceOnUse">
                <!-- Horizontal lines -->
                <line x1="0" y1="30" x2="40" y2="30" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <line x1="80" y1="30" x2="120" y2="30" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <line x1="0" y1="90" x2="30" y2="90" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <line x1="90" y1="90" x2="120" y2="90" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <!-- Vertical lines -->
                <line x1="60" y1="0" x2="60" y2="20" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <line x1="60" y1="60" x2="60" y2="120" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <line x1="30" y1="60" x2="30" y2="120" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <!-- Nodes -->
                <circle cx="60" cy="30" r="3" fill="none" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <circle cx="30" cy="90" r="3" fill="none" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <circle cx="90" cy="60" r="4" fill="none" stroke="rgba(0,80,120,0.25)" stroke-width="1.5"/>
                <!-- L-joints -->
                <polyline points="40,30 60,30 60,60" fill="none" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <polyline points="30,60 30,90 90,90" fill="none" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <polyline points="90,60 90,90" fill="none" stroke="var(--circuit-color)" stroke-width="1.5"/>
                <!-- Small IC pads -->
                <rect x="20" y="25" width="10" height="10" rx="1" fill="none" stroke="rgba(0,60,100,0.2)" stroke-width="1"/>
                <rect x="85" y="55" width="10" height="10" rx="1" fill="none" stroke="rgba(0,60,100,0.2)" stroke-width="1"/>
            </pattern>
            <radialGradient id="redVignette" cx="50%" cy="50%" r="70%">
                <stop offset="30%" stop-color="#050a0e"/>
                <stop offset="100%" stop-color="#1a0000"/>
            </radialGradient>
        </defs>
        <!-- <rect width="1440" height="900" fill="url(#redVignette)"/>
        <rect width="1440" height="900" fill="url(#circuit)"/> -->
    </svg>

    <!-- Overlay effects -->
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="border-frame"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Main UI -->
    <div id="hero">
        <div class="header">
            <div class="header-spacer" aria-hidden="true">ARCADE</div>
            <h1 aria-hidden="true">ARCADE</h1>
            <h1>ARCADE</h1>
        </div>

        <div class="menu-panel" role="navigation" aria-label="Main menu">
            <button class="menu-btn" id="btn1">
                <div class="btn-scan"></div>
                <span class="btn-inner">Simulator</span>
            </button>
            <button class="menu-btn" id="btn2">
                <div class="btn-scan"></div>
                <span class="btn-inner">God's Tower</span>
            </button>
            <button class="menu-btn" id="btn-back">
                <div class="btn-scan"></div>
                <span class="btn-inner">BACK</span>
            </button>
        <div class="status-bar">
            <span><span class="status-dot"></span>SYSTEM ONLINE</span>
            <span>VER 2.4.1</span>
            <span>// ARCADE //</span>
        </div>
    </div>
    <script>
        document.getElementById('btn1').addEventListener("click", () => {
            window.location.href = "Simulator/index.html";
        })
        
        document.getElementById('btn2').addEventListener("click", () => {
            window.location.href = "GodsTower/index.html";
        })

        document.getElementById('btn-back').addEventListener("click", () => {
            window.location.href = "../index.html";
        })
    </script>
</body>
</html>
